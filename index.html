<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東京の天気 | 気象庁データ</title>
  <meta name="description" content="気象庁の公開データから東京の今日の天気・気温・降水確率・気圧を表示します。">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://www.jma.go.jp">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">東京の天気</h1>
      <p class="subtitle">気象庁の公開データを表示しています</p>
    </header>

    <section id="content" class="content" aria-live="polite">
      <div class="loading">
        <div class="spinner" aria-hidden="true"></div>
        <p>気象庁からデータを取得しています…</p>
      </div>
    </section>

    <footer class="footer">
      <button id="reload" class="reload-btn" type="button">再読み込み</button>
      <p class="updated" id="updated"></p>
      <p class="source">
        出典:
        <a href="https://www.jma.go.jp/bosai/" target="_blank" rel="noopener">気象庁</a>
        （予報・アメダス実況データ）
      </p>

      <section class="history">
        <button id="history-toggle" class="history-btn" type="button"
                aria-expanded="false" aria-controls="history-list">
          <span class="history-label">更新履歴</span>
          <span class="history-ver">v0.4.0</span>
          <span class="history-caret" aria-hidden="true">▾</span>
        </button>
        <ul id="history-list" class="history-list" hidden>
          <li>
            <span class="hv">0.4.0</span>
            <span class="hd">2026-06-01</span>
            <span class="ht">時別予報をページ最上部に移動。過去6時間〜12時間後を表示し、現在時刻を明示（縦線・「現在」マーカー、過去は点線）。</span>
          </li>
          <li>
            <span class="hv">0.3.0</span>
            <span class="hd">2026-06-01</span>
            <span class="ht">ページ下部に更新履歴を追加（ボタンで展開できるように）。</span>
          </li>
          <li>
            <span class="hv">0.2.0</span>
            <span class="hd">2026-05</span>
            <span class="ht">12時間後までの気温・天気・気圧の予報グラフを追加。</span>
          </li>
          <li>
            <span class="hv">0.1.0</span>
            <span class="hd">2026-05</span>
            <span class="ht">東京の天気・気温・降水確率・気圧の表示に対応（初版公開）。</span>
          </li>
        </ul>
      </section>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
